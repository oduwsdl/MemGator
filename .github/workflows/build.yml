name: Build Binaries

on:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run Cross-build
        run: ./crossbuild.sh
      - name: Show MemGator CLI Help
        run: /tmp/mgbins/memgator-linux-amd64
      - name: Upload Built MemGator Binaries (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: memgator-bins
          path: /tmp/mgbins
      - name: Check if release already exists
        if: startsWith(github.ref, 'refs/tags/v')
        id: check_release
        run: |
          if gh release view ${{ github.ref_name }} --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::warning::Release tag ${{ github.ref_name }} already exists — skipping release creation."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/mgbins/memgator-*
          generate_release_notes: true
