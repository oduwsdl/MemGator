name: Release

on:
  push:
    branches:
      - master
      - dev
    tags:
      - 'v*'
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    outputs:
      release_exists: ${{ steps.check_release.outputs.exists }}
    steps:
      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view ${{ github.ref_name }} --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::warning::Release tag ${{ github.ref_name }} already exists — skipping release creation."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: check
    if: always() && (needs.check.result == 'skipped' || needs.check.outputs.release_exists == 'false')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run Cross-build
        run: ./crossbuild.sh
      - name: Show MemGator CLI Help
        run: /tmp/mgbins/memgator-linux-amd64
      - name: Upload Built MemGator Binaries (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: memgator-bins
          path: /tmp/mgbins
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/mgbins/memgator-*
          generate_release_notes: true

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'success' && github.event_name != 'pull_request'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/memgator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=master,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
